<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Form Asset | Asset Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-cube"></i>
            <span>AssetFlow</span>
        </div>

        <ul class="menu">
            <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li class="menu-title">Data Master</li>
            <li class="active"><a href="assets.html"><i class="fas fa-box"></i> Assets</a></li>
            <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
            <li><a href="locations.html"><i class="fas fa-location-dot"></i> Locations</a></li>
            <li><a href="suppliers.html"><i class="fas fa-truck"></i> Suppliers</a></li>
            <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
            <li class="menu-title">Transactions</li>
            <li><a href="borrowings.html"><i class="fas fa-right-left"></i> Borrowings</a></li>
            <li><a href="returns.html"><i class="fas fa-rotate-left"></i> Returns</a></li>
            <li><a href="maintenance.html"><i class="fas fa-screwdriver-wrench"></i> Maintenance</a></li>
            <li class="menu-title">Reports</li>
            <li><a href="report.html"><i class="fas fa-file-lines"></i> Reports</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- NAVBAR -->
        <header class="topbar">
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search assets...">
            </div>
            <div class="topbar-right">
                <div class="notification"><i class="fas fa-bell"></i></div>
                <div class="profile"><img src="https://i.pravatar.cc/40" alt=""><span>Admin</span></div>
            </div>
        </header>

        <!-- PAGE HEADER -->
        <section class="page-header">
            <h2>Add / Edit Asset</h2>
            <button class="btn-custom" onclick="window.location.href='data-master.html'">Back to List</button>
        </section>

        <!-- ASSET FORM -->
        <section class="form-card">
            <form id="assetForm">

                <div class="row g-4">

                    <!-- LEFT COLUMN -->
                    <div class="col-md-6">

                        <div class="form-group">
                            <label>Asset Code</label>
                            <div class="input-wrapper">
                                <input type="text" id="assetCode" placeholder="Enter Asset Code" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Asset Name</label>
                            <div class="input-wrapper">
                                <input type="text" id="assetName" placeholder="Enter Asset Name" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Category</label>
                            <div class="input-wrapper">
                                <select id="category" required>
                                    <option value="">Select Category</option>
                                    <option>IT Equipment</option>
                                    <option>Electronics</option>
                                    <option>Furniture</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Location</label>
                            <div class="input-wrapper">
                                <select id="location" required>
                                    <option value="">Select Location</option>
                                    <option>Office A</option>
                                    <option>Office B</option>
                                    <option>Warehouse</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Supplier</label>
                            <div class="input-wrapper">
                                <input type="text" id="supplier" placeholder="Enter Supplier">
                            </div>
                        </div>

                    </div>

                    <!-- RIGHT COLUMN -->
                    <div class="col-md-6">

                        <div class="form-group">
                            <label>Purchase Date</label>
                            <div class="input-wrapper">
                                <input type="date" id="purchaseDate" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Asset Value</label>
                            <div class="input-wrapper">
                                <input type="number" id="assetValue" placeholder="Enter Asset Value">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Condition</label>
                            <div class="input-wrapper">
                                <select id="condition" required>
                                    <option value="">Select Condition</option>
                                    <option>Good</option>
                                    <option>Damaged</option>
                                    <option>Maintenance</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <div class="input-wrapper">
                                <select id="status" required>
                                    <option value="">Select Status</option>
                                    <option>Available</option>
                                    <option>Borrowed</option>
                                    <option>Under Maintenance</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <div class="input-wrapper">
                                <textarea id="description" placeholder="Enter Description"></textarea>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Upload Image</label>
                            <div class="input-wrapper">
                                <input type="file" id="assetImage" accept="image/*">
                            </div>
                        </div>

                    </div>

                </div>

                <!-- FORM BUTTONS -->
                <div class="mt-4 d-flex gap-2">
                    <button type="reset" class="btn-custom">Reset</button>
                    <button type="button" class="btn-custom" onclick="window.location.href='data-master.html'">Cancel</button>
                    <button type="submit" class="btn-custom">Save Asset</button>
                </div>

            </form>
        </section>

    </main>

</div>

<script src="../assets/js/script.js"></script>
<script>
document.getElementById("assetForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Asset saved successfully (dummy action)");
});
</script>

</body>
</html>
